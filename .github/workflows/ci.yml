name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test -p tokito -p tokito-native

      - name: Integration tests
        env:
          TOKITO_RUN_DB_INTEGRATION: "1"
        run: |
          cargo test -p tokito \
            --test api_designs --test api_parts --test api_schematic \
            --test golden_document --test golden_netlist_move \
            --test services_exports --test spec_compliance \
            --test db_stability --test notes_research --test project_workspace \
            --test ai_pipeline_fixtures \
            -- --nocapture
