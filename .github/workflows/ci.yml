name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tokito
          POSTGRES_PASSWORD: tokito
          POSTGRES_DB: tokito_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tokito -d tokito_test"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 30

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test

      - name: Integration test (Postgres)
        env:
          TOKITO_TEST_DATABASE_URL: postgres://tokito:tokito@localhost:5432/tokito_test
        run: cargo test --test integration -- --ignored --nocapture
