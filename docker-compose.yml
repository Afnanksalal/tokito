services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tokito
      POSTGRES_PASSWORD: tokito
      POSTGRES_DB: tokito
    ports:
      - "5433:5432"
    volumes:
      - tokito_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokito -d tokito"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  tokito_pg:
